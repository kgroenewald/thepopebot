# Port Forwards — Traefik dynamic config for code workspace port forwarding
# Activate: set COMPOSE_FILE=docker-compose.yml:docker-compose.port-forwards.yml in .env
#
# This adds a shared traefik-config/ directory between the event handler and
# Traefik. The event handler writes port-forwards.yml into this directory when
# you add a port forward from a code workspace, and Traefik picks it up
# automatically via its file provider (watch mode).

services:
  traefik:
    command:
      - --providers.docker=true
      - --providers.docker.exposedByDefault=false
      - --providers.file.directory=/traefik-config/
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
    volumes:
      - ./traefik-config:/traefik-config:ro

  event-handler:
    volumes:
      - ./traefik-config:/traefik-config
    environment:
      - TRAEFIK_CONFIG_DIR=/traefik-config
